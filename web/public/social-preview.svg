<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black', 'Arial', sans-serif">

  <!-- Background -->
  <rect width="1280" height="640" fill="#f97316"/>

  <!-- Black border frame -->
  <rect x="0" y="0" width="1280" height="640" fill="none" stroke="#0a0a0a" stroke-width="8"/>

  <!-- Top-left decorative blocks -->
  <rect x="40" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="76" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="40" y="76" width="28" height="28" fill="#0a0a0a"/>

  <!-- Top-right decorative blocks -->
  <rect x="1176" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="76" width="28" height="28" fill="#0a0a0a"/>

  <!-- Bottom-left decorative blocks -->
  <rect x="40" y="524" width="28" height="28" fill="#0a0a0a"/>
  <rect x="40" y="560" width="28" height="28" fill="#0a0a0a"/>
  <rect x="76" y="560" width="28" height="28" fill="#0a0a0a"/>

  <!-- Bottom-right decorative blocks -->
  <rect x="1176" y="560" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="524" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="560" width="28" height="28" fill="#0a0a0a"/>

  <!-- Main title: CLAUDIENT -->
  <text x="640" y="220" text-anchor="middle" font-size="128" font-weight="900" fill="#0a0a0a" letter-spacing="-4">CLAUDIENT</text>

  <!-- Subtitle -->
  <text x="640" y="275" text-anchor="middle" font-size="28" font-weight="700" fill="#0a0a0a">63 Skills · Claude Code Knowledge System</text>

  <!-- Category pills row -->
  <g font-size="17" font-weight="800">
    <!-- backend -->
    <rect x="97" y="305" width="140" height="34" fill="#0a0a0a"/>
    <text x="167" y="327" text-anchor="middle" fill="white">backend</text>
    <!-- database -->
    <rect x="249" y="305" width="148" height="34" fill="#0a0a0a"/>
    <text x="323" y="327" text-anchor="middle" fill="white">database</text>
    <!-- devops -->
    <rect x="409" y="305" width="148" height="34" fill="#0a0a0a"/>
    <text x="483" y="327" text-anchor="middle" fill="white">devops-infra</text>
    <!-- ai-engineering -->
    <rect x="569" y="305" width="185" height="34" fill="#0a0a0a"/>
    <text x="661" y="327" text-anchor="middle" fill="white">ai-engineering</text>
    <!-- git -->
    <rect x="766" y="305" width="90" height="34" fill="#0a0a0a"/>
    <text x="811" y="327" text-anchor="middle" fill="white">git</text>
    <!-- productivity -->
    <rect x="868" y="305" width="160" height="34" fill="#0a0a0a"/>
    <text x="948" y="327" text-anchor="middle" fill="white">productivity</text>
    <!-- data-ml -->
    <rect x="1040" y="305" width="143" height="34" fill="#0a0a0a"/>
    <text x="1111" y="327" text-anchor="middle" fill="white">data-ml</text>
  </g>

  <!-- npm install badge -->
  <rect x="340" y="360" width="600" height="60" fill="#0a0a0a" rx="0"/>
  <text x="640" y="398" text-anchor="middle" font-size="26" font-weight="700" fill="#f97316" font-family="'Courier New', monospace">npx claudient add all</text>

  <!-- Stats row -->
  <g font-size="22" font-weight="900" fill="#0a0a0a">
    <!-- Skills -->
    <rect x="108" y="444" width="190" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="111" y="447" width="190" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="206" y="484" text-anchor="middle" font-size="24">63 Skills</text>

    <!-- Agents -->
    <rect x="328" y="444" width="180" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="331" y="447" width="180" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="421" y="484" text-anchor="middle" font-size="24">6 Agents</text>

    <!-- Hooks -->
    <rect x="538" y="444" width="165" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="541" y="447" width="165" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="623" y="484" text-anchor="middle" font-size="24">7 Hooks</text>

    <!-- Languages -->
    <rect x="733" y="444" width="210" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="736" y="447" width="210" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="841" y="484" text-anchor="middle" font-size="24">5 Languages</text>

    <!-- MIT -->
    <rect x="973" y="444" width="200" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="976" y="447" width="200" height="62" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="1076" y="484" text-anchor="middle" font-size="24">MIT · Free</text>
  </g>

  <!-- Stack highlight line -->
  <text x="640" y="548" text-anchor="middle" font-size="18" font-weight="700" fill="#0a0a0a">
    Drizzle · Better Auth · Vercel AI SDK · shadcn/ui · Railway · Supabase · Redis · MCP
  </text>

  <!-- Bottom credit -->
  <text x="640" y="590" text-anchor="middle" font-size="18" font-weight="700" fill="#0a0a0a" opacity="0.7">by uitbreiden.com · github.com/Claudients/Claudient</text>

</svg>
